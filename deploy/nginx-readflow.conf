# Nginx — alternativa si ya usas Nginx en el VPS.
#
# 1) Guardar como /etc/nginx/sites-available/readflow.conf
# 2) Habilitar:  sudo ln -s /etc/nginx/sites-available/readflow.conf /etc/nginx/sites-enabled/
# 3) Probar y recargar:  sudo nginx -t && sudo systemctl reload nginx
# 4) Emitir el certificado TLS (una vez):
#      sudo certbot --nginx -d readflow.gleering.com.ar
#    Certbot reescribe este archivo para añadir el bloque 443 + redirección.
#
# Requisito: el DNS de readflow.gleering.com.ar (registro A) debe apuntar a la IP del VPS.

server {
    listen 80;
    listen [::]:80;
    server_name readflow.gleering.com.ar;

    # Tamaño máximo de subida (PDFs grandes).
    client_max_body_size 50M;

    # Cabeceras de seguridad básicas.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }
}
